name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: python -m pytest --cov --cov-report=term-missing

      - name: CLI smoke test
        shell: bash
        env:
          EBBINGHAUS_DB_PATH: ${{ runner.temp }}/smoke.sqlite
        run: |
          ebbinghaus --version
          ebbinghaus add "smoke front" -b "smoke back" -t smoke
          ebbinghaus list | grep -q "smoke front"
          ebbinghaus stats | grep -q "Total cards"

  lint:
    name: lint + types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: python -m ruff check src tests

      - name: Mypy (types)
        run: python -m mypy src
