name: Verify

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  structure:
    name: Archive Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Required files
        run: |
          for f in README.md LICENSE; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              exit 1
            fi
          done

      - name: dist artifacts present
        run: |
          for f in dist/Review_Reminder.exe dist/Review_Reminder.pdb dist/README.md; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing dist artifact: $f"
              exit 1
            fi
          done

      - name: build-artifacts present
        run: |
          if [ ! -d build-artifacts/obj-Release ]; then
            echo "::error::Missing build-artifacts/obj-Release/"
            exit 1
          fi
          # Spot check: BAML and generated .g.cs files exist
          count=$(find build-artifacts/obj-Release -name "*.baml" | wc -l)
          if [ "$count" -lt 5 ]; then
            echo "::warning::Only $count BAML files found, expected more"
          fi

      - name: docs/presentation.pdf present
        run: |
          if [ ! -f docs/presentation.pdf ]; then
            echo "::error::Missing docs/presentation.pdf"
            exit 1
          fi

      - name: README links resolve
        run: |
          missing=0
          for link in $(grep -oE '\]\([^)]+\)' README.md | sed 's|](||; s|)$||' | grep -v '^http' | grep -v '^#' | sort -u); do
            path="${link%%#*}"
            [ -z "$path" ] && continue
            if [ ! -e "$path" ]; then
              echo "::warning::README links to missing path: $link"
              missing=$((missing+1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::warning::$missing README link(s) point to non-existent paths"
          fi
