<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Ebbinghaus Reviewer{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12" crossorigin="anonymous"></script>
  <style>
    :root { color-scheme: light dark; --accent: #512BD4; --ok: #16a34a; --bad: #dc2626; }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      max-width: 760px; margin: 0 auto; padding: 1.5rem; line-height: 1.5;
    }
    header { display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap;
             border-bottom: 1px solid color-mix(in srgb, currentColor 20%, transparent);
             padding-bottom: .75rem; margin-bottom: 1.25rem; }
    header h1 { margin: 0; font-size: 1.25rem; }
    nav a { margin-right: 1rem; text-decoration: none; color: var(--accent); font-weight: 600; }
    nav a:hover { text-decoration: underline; }
    table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
    th, td { text-align: left; padding: .4rem .6rem; border-bottom: 1px solid
             color-mix(in srgb, currentColor 12%, transparent); }
    th { font-size: .8rem; text-transform: uppercase; letter-spacing: .03em; opacity: .7; }
    .due { color: var(--bad); font-weight: 600; }
    .card { border: 1px solid color-mix(in srgb, currentColor 20%, transparent);
            border-radius: 10px; padding: 1.25rem; margin: 1rem 0; }
    .card .front { font-size: 1.3rem; font-weight: 700; }
    .card .back { opacity: .75; margin-top: .5rem; }
    form.inline { display: inline; }
    input[type=text], textarea {
      width: 100%; padding: .5rem; margin: .25rem 0 .75rem; border-radius: 6px;
      border: 1px solid color-mix(in srgb, currentColor 30%, transparent);
      background: transparent; color: inherit;
    }
    button { cursor: pointer; border: 0; border-radius: 6px; padding: .5rem .9rem;
             font-weight: 600; background: var(--accent); color: #fff; }
    button.ghost { background: transparent; color: var(--bad);
                   border: 1px solid color-mix(in srgb, var(--bad) 50%, transparent); }
    .grades { display: flex; gap: .4rem; flex-wrap: wrap; margin-top: 1rem; }
    .grades button { background: color-mix(in srgb, var(--accent) 80%, #000); }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
                 gap: .75rem; margin: 1rem 0; }
    .stat { border: 1px solid color-mix(in srgb, currentColor 18%, transparent);
            border-radius: 8px; padding: .75rem; text-align: center; }
    .stat .n { font-size: 1.5rem; font-weight: 700; }
    .stat .l { font-size: .75rem; opacity: .7; }
    footer { margin-top: 2rem; font-size: .8rem; opacity: .6; }
  </style>
</head>
<body>
  <header>
    <h1>🧠 Ebbinghaus Reviewer</h1>
    <nav>
      <a href="/">Today</a>
      <a href="/cards">Cards</a>
      <a href="/review">Review</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    Spaced repetition via the SM-2 algorithm along the Ebbinghaus forgetting curve.
  </footer>
</body>
</html>
